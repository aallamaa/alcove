name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All 10 native build variants (parser/speed/mono/jit/jit-mono x {alcove,adder})
  # run against test.alc / test.adr, plus every per-module C unit+fuzz harness
  # under ASan/UBSan. test-all's wasm stage self-skips here (no emcc); the wasm
  # job below covers it.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libffi-dev
      - name: Cross-variant suite (make test-all)
        run: make test-all
      - name: C unit + fuzz harnesses (ASan/UBSan)
        run: |
          set -e
          for t in parser hamt dict blob set vector msgpack utf8 json; do
            echo "::group::$t-test"; make $t-test; echo "::endgroup::"
          done
          echo "::group::adr-test"; make adr-test; echo "::endgroup::"
      - name: Formatter verification (make adfmt-test)
        run: make adfmt-test
      - name: MPSC primitive under ThreadSanitizer
        # The lock-free MPSC queue backing RESP --threads. gcc ships libtsan on
        # ubuntu-latest, so build+run directly and FAIL the job on any race or
        # test failure (the `make mpsc-test-tsan` target is lenient — it swallows
        # a nonzero exit as "skipping" for dev machines without libtsan; in CI we
        # want it to be a hard gate).
        run: |
          cc -O1 -g -Wall -W -pthread -fsanitize=thread -o mpsc_test_tsan mpsc_test.c
          TSAN_OPTIONS=halt_on_error=1 ./mpsc_test_tsan

  # Full interpreter (jit variant) under ASan+UBSan. test-all runs the
  # evaluator/VM/JIT WITHOUT sanitizers; this is the only job that exercises the
  # HOT PATH under instrumentation, so a memory-safety/UB bug there can't pass
  # CI silently. Runs the whole test.alc / test.adr; leaks are off (intentional
  # global/arena retention at exit; per-alloc leaks are covered by the unit job).
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libffi-dev
      - name: Hot path under ASan+UBSan (make test-asan)
        run: make test-asan
      - name: OOM recovery (make oom-test)
        # Injected allocation failure mid-computation must abort the form with a
        # catchable error and keep the process + engine usable — under a normal
        # AND an ASan/UBSan build (longjmp recovery must not corrupt state).
        run: make oom-test

  # End-to-end concurrency gate: a 4-reactor RESP server under ThreadSanitizer,
  # driven by concurrent clients on a shared key (+ distinct keys + a
  # redis-defcmd callback), must be data-race-clean. Complements mpsc-test-tsan
  # (the queue primitive in isolation). The harness skips cleanly if redis-cli
  # or libtsan is unavailable.
  resp-tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps (redis-cli for the client driver)
        run: sudo apt-get update && sudo apt-get install -y redis-tools
      - name: Multi-reactor RESP under ThreadSanitizer (make resp-tsan)
        run: make resp-tsan

  # Layer-2 keyspace watches over a real --threads 4 server: enable, mutate
  # through redis-cli, drain on the main thread. Skips cleanly without
  # redis-cli.
  resp-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps (redis-cli client driver, tmux for the -R REPL phase)
        run: sudo apt-get update && sudo apt-get install -y redis-tools libffi-dev libreadline-dev tmux
      - name: Keyspace watches against a live server (make resp-watch-test)
        run: make resp-watch-test

  # Perf-regression gate: build baseline (merge-base / parent commit) AND
  # HEAD on the same runner, run 5 gate kernels interleaved min-of-15, fail
  # on >15% regression or checksum divergence. Noise-robust by construction:
  # only same-runner ratios are ever compared.
  bench-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libffi-dev libreadline-dev
      - name: Perf gate vs baseline (make bench-gate)
        run: make bench-gate

  # Observability gate: leveled logfmt logging emits exactly one logfmt line per
  # emit on stderr (and is silent below threshold), and the opt-in metrics build
  # (-DALCOVE_METRICS) auto-instruments the RESP server — resp.connections/
  # .commands/.errors all climb under driven traffic. The server half skips
  # cleanly if redis-cli is unavailable.
  obs-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps (redis-cli for the client driver)
        run: sudo apt-get update && sudo apt-get install -y redis-tools
      - name: Logging + RESP auto-metrics (make obs-test)
        run: make obs-test

  # wasm/Emscripten build + node smoke battery (asserts results == native).
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
      - name: wasm smoke (make test-web)
        # setup-emsdk shadows `node` on PATH with its own bundled node; bare
        # `node` isn't directly runnable in the make sub-shell, so use the
        # emsdk-provided binary explicitly.
        run: make test-web NODE="$EMSDK_NODE"

  # Coverage-guided libFuzzer over the reader and the Adder transpiler — short
  # runs (60s each) to catch parser/transpiler regressions on every push.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps (clang for libFuzzer)
        run: sudo apt-get update && sudo apt-get install -y clang libffi-dev
      - name: libFuzzer — reader
        run: make fuzz FUZZ_ARGS='-max_total_time=60 -print_final_stats=0'
      - name: libFuzzer — adder transpiler
        run: make adr-fuzz FUZZ_ARGS='-max_total_time=60 -print_final_stats=0'
      - name: libFuzzer — msgpack decoder
        run: make msgpack-fuzz FUZZ_ARGS='-max_total_time=60 -print_final_stats=0'
      - name: libFuzzer — JSON decoder
        run: make json-fuzz FUZZ_ARGS='-max_total_time=60 -print_final_stats=0'

  # JIT-tier differential: builds jit + nojit and asserts every fuzzed numeric
  # loop / leaf / recursion shape produces byte-identical results on the native
  # JIT and the bytecode VM. This is the ONLY gate that exercises the JIT tier
  # against the VM, so it must run on every push (test-all does not cover it).
  jit-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libffi-dev
      - name: JIT vs VM byte-identical fuzz
        run: make jit-fuzz

  # Generative whole-program differential fuzzer for the evaluator/VM/JIT:
  # random terminating/pure programs across the full breadth of constructs,
  # each checked AST==VM byte-identical under nojit + jit + an ASan/UBSan build
  # (no crash, sanitizer-clean). The reader/transpiler/msgpack have libFuzzer
  # targets; this is the only adversarial-program gate over the eval path.
  eval-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libffi-dev
      - name: AST vs VM byte-identical program fuzz (+ ASan)
        run: make eval-fuzz

  # Code-coverage SIGNAL (not a gate): how much of the hot path (evaluator / VM /
  # JIT + core fragments) does the suite + differential gates actually exercise?
  # Reports per-fragment line coverage and uploads the .gcov files as an
  # artifact. No pass/fail threshold — a flaky one would just be noise; the value
  # is making "are we testing the evaluator enough?" answerable.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libffi-dev
      - name: Coverage report (make coverage)
        run: make coverage
      - name: Upload .gcov report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gcov
          path: "*.gcov"
          if-no-files-found: warn
