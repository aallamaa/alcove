name: Deploy Web Demos to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build Alcove Web
        run: make web

      - name: Build Mario Web
        run: |
          cd examples/mario
          make web

      - name: Stage Pages
        run: |
          mkdir -p public/docs
          cp -R web/. public/
          cp -R examples/mario/web/. public/
          cp docs/lisp-hyperpolyglot-alcove.html public/docs/
          sed -i 's#../docs/lisp-hyperpolyglot-alcove.html#docs/lisp-hyperpolyglot-alcove.html#g' public/learn.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
