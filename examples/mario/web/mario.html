<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>alcove mario (browser)</title>
<style>
  body {
    font: 14px/1.4 system-ui, sans-serif;
    margin: 0; padding: 1rem;
    background: #1a1a1a; color: #ddd;
    display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  }
  h1 { margin: 0; font-size: 1.1rem; font-weight: 500; color: #aaa; text-align: center; }
  #canvas {
    border: 2px solid #444;
    image-rendering: pixelated;
    background: #6688ff;
    outline: none;
    max-width: 100%;
    height: auto;
  }
  #controls { font-size: 12px; color: #888; text-align: center; }
  kbd {
    background: #333; color: #ddd; border: 1px solid #555;
    border-radius: 3px; padding: 1px 6px; font: 12px ui-monospace, monospace;
  }
  #alcove-output {
    width: 800px; max-width: 100%; max-height: 8rem; overflow: auto;
    margin: 0; padding: 0.5rem;
    background: #111; color: #ccc;
    font: 12px/1.3 ui-monospace, Menlo, Consolas, monospace;
    border-radius: 3px;
    white-space: pre-wrap;
  }
  #mobile-controls {
    display: none;
    width: 100%; max-width: 800px;
    justify-content: space-between;
    padding: 10px 20px;
    box-sizing: border-box;
  }
  .dpad { display: flex; gap: 20px; }
  .btn {
    background: rgba(255, 255, 255, 0.15); border: 2px solid #666;
    color: white; font-size: 28px; border-radius: 50%;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    user-select: none; touch-action: manipulation; cursor: pointer;
  }
  .btn:active { background: rgba(255, 255, 255, 0.4); }
  @media (max-width: 800px) {
    #mobile-controls { display: flex; }
    #controls { display: none; }
    body { padding: 0.5rem; }
  }
</style>
</head>
<body>

<h1>alcove mario — running in WebAssembly</h1>
<canvas id="canvas" width="800" height="480" tabindex="0"></canvas>

<div id="controls">
  <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> to move,
  <kbd>Space</kbd> / <kbd>↑</kbd> / <kbd>W</kbd> / <kbd>Z</kbd> to jump,
  <kbd>Esc</kbd> / <kbd>Q</kbd> to quit.
  Click the canvas first to give it keyboard focus.
</div>

<div id="mobile-controls">
  <div class="dpad">
    <div class="btn" id="btn-left">←</div>
    <div class="btn" id="btn-right">→</div>
  </div>
  <div class="btn" id="btn-jump">↑</div>
</div>

<pre id="alcove-output"></pre>

<script src="mario_gfx.js"></script>
<script src="mario.js"></script>
</body>
</html>
