<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>alcove in the browser</title>
<style>
  body { font: 14px/1.45 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  pre, textarea { font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; }
  textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; min-height: 7rem; }
  #alcove-output { background: #111; color: #eee; padding: 0.75rem; min-height: 6rem; white-space: pre-wrap; border-radius: 4px; }
  button { padding: 0.4rem 0.9rem; }
  .row { display: flex; gap: 0.5rem; margin: 0.5rem 0; align-items: center; }
</style>
</head>
<body>

<h1>alcove in the browser</h1>

<p>Lisp-style interpreter compiled to WebAssembly via Emscripten. The block
below is a literal <code>&lt;script type="text/alcove"&gt;</code> tag — it runs
on page load and prints into the output box.</p>

<script type="text/alcove">
  (prn "hello from alcove" (+ 1 2 3))
  (def fact (n) (if (< n 2) 1 (* n (fact (- n 1)))))
  (prn "10! =" (fact 10))
</script>

<p>You can also drive it from JS by calling <code>Alcove.eval(src)</code>:</p>

<div class="row">
  <textarea id="src" spellcheck="false">(prn (* 6 7))</textarea>
</div>
<div class="row">
  <button id="run">Run</button>
  <button id="clear">Clear output</button>
</div>

<pre id="alcove-output"></pre>

<script src="alcove.js"></script>
<script>
  document.getElementById("run").addEventListener("click", async () => {
    await Alcove.eval(document.getElementById("src").value);
  });
  document.getElementById("clear").addEventListener("click", () => {
    document.getElementById("alcove-output").textContent = "";
  });
</script>

</body>
</html>
